version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    # Tắt auto PR — quản lý dependencies thủ công để tránh conflict
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"
    versioning-strategy: "increase-if-necessary"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    # Tắt auto PR — Python version quản lý thủ công
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "docker"
