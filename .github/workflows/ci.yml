name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Ngăn chặn việc chạy nhiều pipeline chồng chéo khi push liên tục
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run Ruff check
      uses: astral-sh/ruff-action@v3
      with:
        args: "check --output-format=github"
    - name: Run Ruff format check
      uses: astral-sh/ruff-action@v3
      with:
        args: "format --check"

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # drain3 installed separately: its metadata pins cachetools==4.2.1
        # but works fine with cachetools>=5.5 (required by streamlit)
        pip install drain3==0.9.11 --no-deps
        pip install jsonpickle>=1.5.1
        # CI-only quality tooling (KHÔNG thêm vào requirements runtime).
        # Pin pyright để CI reproducible (tránh version-drift làm đỏ CI bất ngờ).
        pip install "pyright==1.1.409" pytest-cov

    - name: Build RAG indexes
      run: |
        python -m src.rag.embedder

    - name: Static type check (pyright)
      run: |
        pyright src

    - name: Run unit and integration tests (with coverage)
      env:
        REDIS_URL: redis://localhost:6379/0
        MOCK_LLM: "1"
      run: |
        pytest --cov=src --cov-report=term-missing --cov-report=xml

    - name: Upload coverage artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        if-no-files-found: ignore
