name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Ngăn chặn việc chạy nhiều pipeline chồng chéo khi push liên tục
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # drain3 installed separately: its metadata pins cachetools==4.2.1
        # but works fine with cachetools>=5.5 (required by streamlit)
        pip install drain3==0.9.11 --no-deps
        pip install jsonpickle>=1.5.1
        
    - name: Run unit and integration tests
      env:
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest > pytest_output.log 2>&1 || {
          cat pytest_output.log
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b ci-debug
          git add pytest_output.log
          git commit -m "debug: add pytest output log"
          git push origin ci-debug -f
          exit 2
        }

