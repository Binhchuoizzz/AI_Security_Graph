name: Security Audit

on:
  push:
    branches: [ "main" ]
  schedule:
    # Chạy tự động vào 00:00 UTC mỗi thứ Hai
    - cron: '0 0 * * 1'

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
        pip install -r requirements.txt
        # drain3 installed separately (cachetools version conflict)
        pip install drain3==0.9.11 --no-deps
        pip install jsonpickle>=1.5.1
        
    - name: Run pip-audit (CVE scan)
      run: |
        # Audit project dependencies, ignoring pip itself (tooling, not project dep)
        pip-audit --desc --ignore-vuln CVE-2026-3219


  secrets-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for secret scanning

    - name: Scan for hardcoded secrets
      uses: trufflesecurity/trufflehog@main
      with:
        extra_args: --only-verified
