agent:
  memory:
    max_decisions_in_prompt: 3
    max_iocs: 100
    max_iocs_in_prompt: 20
    max_narrative_tokens: 500
correlation:
  min_events_to_correlate: 3
  time_window_minutes: 5
dashboard:
  port: 8501
  session_timeout_minutes: 30
evaluation:
  ground_truth_path: experiments/ground_truth.json
  method: both
guardrails:
  drain3:
    depth: 4
    max_clusters: 100
    max_samples_per_template: 3
    similarity_threshold: 0.4
  entropy_threshold: 4.5
  injection_patterns:
  - ignore previous instructions
  - you are now
  - system prompt
  - disregard
  - <script>
  - DROP TABLE
  - UNION SELECT
  - ; exec
  - forget everything
  - act as
  - new instructions
  token_budget: 4000
llm:
  base_url: http://host.docker.internal:5000/v1
  estimated_vram_gb: 7
  max_context_tokens: 8192
  model_name: gemma-2-9b-it-Q6_K
  request_timeout_seconds: 120
  temperature: 0.1
logging:
  audit_db_path: logs/audit_trail.db
  debug_log_path: logs/system_debug.log
  level: INFO
mlflow:
  experiment_name: sentinel_framework
  tracking_uri: http://localhost:5001
rag:
  embedding_model: all-MiniLM-L6-v2
  faiss_index_path: knowledge_base/faiss_index
  iso_27001_path: knowledge_base/iso_27001_controls.json
  mitre_attack_path: knowledge_base/mitre_attack.json
  semantic_cache:
    max_size: 500
    ttl_seconds: 1800
  top_k_results: 3
redis:
  escalated_queue: escalated_logs
  publisher_delay_seconds: 0.5
  queue_name: security_logs_stream
  url: redis://localhost:6379/0
tier1:
  dynamic_rules:
  - created_at: '2026-04-18T02:49:47.345963'
    field: Source IP
    pattern: UNKNOWN_IP
    reason: Multiple failed login attempts from the same IP address targeting common
      usernames (root, admin, user) on port 22 indicate a brute force attack. Blocking
      the IP address mitigates the immediate threat.
    score: 100
    source: langgraph_agent
    status: PENDING_APPROVAL
  max_fwd_packets: 1000
  risk_threshold: 30
  sensitive_ports:
  - 21
  - 22
  - 23
  - 3389
  - 445
  - 1433
  - 3306
  - 5432
  session_baseline:
    deviation_threshold: 2.0
    eviction_interval: 100
    ttl_seconds: 600
    window_seconds: 300
