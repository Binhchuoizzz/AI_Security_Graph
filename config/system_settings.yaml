agent:
  memory:
    max_decisions_in_prompt: 3
    max_iocs: 100
    max_iocs_in_prompt: 20
    max_narrative_tokens: 500
correlation:
  min_events_to_correlate: 3
  time_window_minutes: 5
dashboard:
  port: 8501
  session_timeout_minutes: 30
evaluation:
  ground_truth_path: experiments/ground_truth.json
  method: both
guardrails:
  drain3:
    depth: 4
    max_clusters: 100
    max_samples_per_template: 3
    similarity_threshold: 0.4
  entropy_threshold: 4.5
  injection_patterns:
  - ignore previous instructions
  - you are now
  - system prompt
  - disregard
  - <script>
  - DROP TABLE
  - UNION SELECT
  - ; exec
  - forget everything
  - act as
  - new instructions
  - override your instructions
  - bypass safety
  - pretend you are
  - roleplay as
  - respond without restrictions
  jailbreak_patterns:
  - DAN mode
  - Do Anything Now
  - Developer Mode
  - jailbroken
  - ignore all previous
  - you have no restrictions
  - act without limitations
  - bypass your guidelines
  - entering unrestricted mode
  - from now on you will
  - simulate a persona
  - hypothetically speaking
  - for educational purposes only
  - pretend there are no rules
  - you are no longer bound
  output_sanitizer:
    enabled: true
    strip_data_uris: true
    strip_html_tags: true
    strip_markdown_images: true
  token_budget: 4000
llm:
  base_url: http://host.docker.internal:5000/v1
  estimated_vram_gb: 7
  max_context_tokens: 8192
  model_name: gemma-2-9b-it-Q6_K
  request_timeout_seconds: 120
  temperature: 0.1
logging:
  audit_db_path: logs/audit_trail.db
  debug_log_path: logs/system_debug.log
  level: INFO
mlflow:
  experiment_name: sentinel_framework
  tracking_uri: http://localhost:5001
rag:
  embedding_model: all-MiniLM-L6-v2
  faiss_index_path: knowledge_base/faiss_index
  iso_27001_path: knowledge_base/iso_27001_controls.json
  mitre_attack_path: knowledge_base/mitre_attack.json
  semantic_cache:
    max_size: 500
    ttl_seconds: 1800
  top_k_results: 3
redis:
  escalated_queue: escalated_logs
  publisher_delay_seconds: 0.5
  queue_name: security_logs_stream
  url: redis://localhost:6379/0
threat_memory:
  apt_threshold_days: 7
  apt_threshold_incidents: 5
  db_path: config/threat_memory.db
  max_context_tokens: 300
  reputation_decay_inactive_days: 7
  reputation_decay_rate: 0.95
tier1:
  dynamic_rules:
  - created_at: '2026-04-18T02:49:47.345963'
    field: Source IP
    pattern: UNKNOWN_IP
    reason: Multiple failed login attempts from the same IP address targeting common
      usernames (root, admin, user) on port 22 indicate a brute force attack. Blocking
      the IP address mitigates the immediate threat.
    score: 100
    source: langgraph_agent
    status: REJECTED
  - created_at: '2026-04-22T01:26:03.500385'
    field: Source IP
    pattern: 192.168.1.1
    reason: Multiple events from the same IP address targeting port 80 with suspicious
      traffic patterns.  The events exhibit characteristics of port scanning and potential
      reconnaissance activities, as indicated by the high number of unique ports accessed
      and the volume of traffic. This behavior aligns with MITRE ATT&CK technique
      T1589 (Gather Victim Identity Information) and ISO 27001 control A.12.1.1 (Access
      Control).
    score: 100
    source: langgraph_agent
    status: REJECTED
  max_fwd_packets: 1000
  risk_threshold: 15
  sensitive_ports:
  - 21
  - 22
  - 23
  - 80
  - 443
  - 3389
  - 445
  - 1433
  - 3306
  - 5432
  session_baseline:
    deviation_threshold: 2.0
    eviction_interval: 100
    ttl_seconds: 600
    window_seconds: 300
  whitelist_ips:
  - 127.0.0.1
  - 10.0.0.99
  - 192.168.1.254
  - 0.0.0.0
