agent:
  memory:
    max_decisions_in_prompt: 3
    max_iocs: 100
    max_iocs_in_prompt: 20
    max_narrative_tokens: 500
correlation:
  min_events_to_correlate: 3
  time_window_minutes: 5
dashboard:
  port: 8501
  session_timeout_minutes: 30
evaluation:
  ground_truth_path: experiments/ground_truth.json
  method: both
guardrails:
  drain3:
    depth: 4
    max_clusters: 100
    max_samples_per_template: 3
    similarity_threshold: 0.4
  entropy_threshold: 4.5
  injection_patterns:
  - ignore previous instructions
  - you are now
  - system prompt
  - disregard
  - <script>
  - DROP TABLE
  - UNION SELECT
  - ; exec
  - forget everything
  - act as
  - new instructions
  - override your instructions
  - bypass safety
  - pretend you are
  - roleplay as
  - respond without restrictions
  jailbreak_patterns:
  - DAN mode
  - Do Anything Now
  - Developer Mode
  - jailbroken
  - ignore all previous
  - you have no restrictions
  - act without limitations
  - bypass your guidelines
  - entering unrestricted mode
  - from now on you will
  - simulate a persona
  - hypothetically speaking
  - for educational purposes only
  - pretend there are no rules
  - you are no longer bound
  output_sanitizer:
    enabled: true
    strip_data_uris: true
    strip_html_tags: true
    strip_markdown_images: true
  token_budget: 4000
llm:
  base_url: http://host.docker.internal:5000/v1
  estimated_vram_gb: 7
  max_context_tokens: 8192
  model_name: gemma-2-9b-it-Q4_K_M
  request_timeout_seconds: 120
  temperature: 0.1
logging:
  audit_db_path: logs/audit_trail.db
  debug_log_path: logs/system_debug.log
  level: INFO
mlflow:
  experiment_name: sentinel_framework
  tracking_uri: http://localhost:5001
rag:
  embedding_model: all-MiniLM-L6-v2
  faiss_index_path: knowledge_base/faiss_index
  mitre_attack_path: knowledge_base/mitre_attack.json
  nist_800_61r2_path: knowledge_base/nist_800_61r2.json
  semantic_cache:
    max_size: 500
    ttl_seconds: 1800
  top_k_results: 3
redis:
  escalated_queue: escalated_logs
  publisher_delay_seconds: 0.5
  queue_name: security_logs_stream
  url: redis://localhost:6379/0
threat_memory:
  apt_threshold_days: 7
  apt_threshold_incidents: 5
  db_path: config/threat_memory.db
  max_context_tokens: 300
  reputation_decay_inactive_days: 7
  reputation_decay_rate: 0.95
tier1:
  dynamic_rules:
  - created_at: '2026-04-18T02:49:47.345963'
    field: Source IP
    pattern: UNKNOWN_IP
    reason: Nhiều lần đăng nhập thất bại từ cùng một địa chỉ IP nhắm vào các tên người
      dùng phổ biến (root, admin, user) trên cổng 22 cho thấy có tấn công Brute Force.
      Chặn IP này giúp ngăn chặn mối đe dọa ngay lập tức.
    score: 100
    source: langgraph_agent
    status: REJECTED
  - created_at: '2026-04-22T01:26:03.500385'
    field: Source IP
    pattern: 192.168.1.1
    reason: Nhiều sự kiện từ cùng một địa chỉ IP nhắm vào cổng 80 với các mẫu lưu
      lượng đáng ngờ. Các sự kiện này thể hiện đặc điểm của hoạt động quét cổng và
      trinh sát, được chỉ ra bởi số lượng lớn các cổng duy nhất được truy cập và khối
      lượng lưu lượng lớn. Hành vi này khớp với kỹ thuật MITRE ATT&CK T1589 (Thu thập
      thông tin định danh nạn nhân) và giai đoạn Phát hiện của NIST SP 800-61r2 (Kiểm
      soát truy cập).
    score: 100
    source: langgraph_agent
    status: REJECTED
  - created_at: '2026-05-08T02:40:38.264417'
    field: Source IP
    pattern: 192.168.1.100
    reason: Suy luận mô phỏng từ MOCK_LLM=1. Phát hiện bất thường khớp với các kỹ
      thuật MITRE và các giai đoạn ngăn chặn của NIST.
    score: 100
    source: langgraph_agent
    status: ACTIVE
  - created_at: '2026-05-28T05:50:17.345341'
    field: Source IP
    pattern: UNKNOWN_TARGET
    reason: Nhiều nhật ký từ queue_waf cho thấy tần suất yêu cầu cao nhắm vào cổng
      80, vượt quá ngưỡng bình thường. Điều này gợi ý khả năng xảy ra tấn công DDoS
      hoặc khuếch đại lưu lượng độc hại.
    score: 100
    source: langgraph_agent
    status: PENDING_APPROVAL
  - created_at: '2026-05-28T05:50:50.266077'
    field: Source IP
    pattern: N/A
    reason: Nhiều nhật ký từ queue_waf cho thấy hoạt động quét cổng trên diện rộng
      nhắm vào cả cổng thông thường và cổng không tiêu chuẩn. Việc truy cập cổng 80
      kết hợp với lưu lượng lớn gợi ý khả năng xảy ra tấn công DDoS.
    score: 100
    source: langgraph_agent
    status: PENDING_APPROVAL
  - created_at: '2026-05-28T06:08:42.230922'
    field: Source IP
    pattern: 192.168.2.150
    reason: Nhiều cảnh báo từ cảm biến queue_waf cho thấy các nỗ lực liên tục truy
      cập cổng 80 từ cùng một IP nguồn. Hành vi này khớp với đặc trưng của tấn công
      DDoS, có khả năng tận dụng kỹ thuật quảng cáo độc hại (malvertising).
    score: 100
    source: langgraph_agent
    status: PENDING_APPROVAL
  max_fwd_packets: 1000
  risk_threshold: 15
  sensitive_ports:
  - 21
  - 22
  - 23
  - 80
  - 443
  - 3389
  - 445
  - 1433
  - 3306
  - 5432
  session_baseline:
    deviation_threshold: 2.0
    eviction_interval: 100
    ttl_seconds: 600
    window_seconds: 300
  whitelist_ips:
  - 127.0.0.1
  - 10.0.0.99
  - 192.168.1.254
  - 0.0.0.0
