  # experiments/build_golden_baseline.py. Bật để khởi tạo baseline từ dữ liệu sạch
  # thay vì warmup online; sau seed vẫn cập nhật online có điều kiện (chỉ DROP/LOG).
  golden_baseline:
    enabled: false
    path: config/golden_baseline.json
