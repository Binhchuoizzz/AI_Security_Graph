agent:
  memory:
    max_decisions_in_prompt: 3
    max_iocs: 100
    max_iocs_in_prompt: 20
    max_narrative_tokens: 500
correlation:
  min_events_to_correlate: 3
  time_window_minutes: 5
dashboard:
  port: 8501
  session_timeout_minutes: 30
evaluation:
  ground_truth_path: experiments/ground_truth.json
  method: both
guardrails:
  drain3:
    depth: 4
    max_clusters: 100
    max_samples_per_template: 3
    similarity_threshold: 0.4
  entropy_threshold: 4.5
  injection_patterns:
  - ignore previous instructions
  - you are now
  - system prompt
  - disregard
  - <script>
  - DROP TABLE
  - UNION SELECT
  - ; exec
  - forget everything
  - act as
  - new instructions
  - override your instructions
  - bypass safety
  - pretend you are
  - roleplay as
  - respond without restrictions
  jailbreak_patterns:
  - DAN mode
  - Do Anything Now
  - Developer Mode
  - jailbroken
  - ignore all previous
  - you have no restrictions
  - act without limitations
  - bypass your guidelines
  - entering unrestricted mode
  - from now on you will
  - simulate a persona
  - hypothetically speaking
  - for educational purposes only
  - pretend there are no rules
  - you are no longer bound
  output_sanitizer:
    enabled: true
    strip_data_uris: true
    strip_html_tags: true
    strip_markdown_images: true
  token_budget: 4000
llm:
  base_url: http://host.docker.internal:5000/v1
  estimated_vram_gb: 7
  max_context_tokens: 8192
  model_name: gemma-2-9b-it-Q4_K_M
  request_timeout_seconds: 120
  temperature: 0.1
logging:
  audit_db_path: logs/audit_trail.db
  debug_log_path: logs/system_debug.log
  level: INFO
mlflow:
  experiment_name: sentinel_framework
  tracking_uri: http://localhost:5001
rag:
  embedding_model: all-MiniLM-L6-v2
  faiss_index_path: knowledge_base/faiss_index
  mitre_attack_path: knowledge_base/mitre_attack.json
  nist_800_61r2_path: knowledge_base/nist_800_61r2.json
  semantic_cache:
    max_size: 500
    ttl_seconds: 1800
  top_k_results: 3
redis:
  escalated_queue: escalated_logs
  publisher_delay_seconds: 0.5
  queue_name: security_logs_stream
  url: redis://localhost:6379/0
threat_memory:
  apt_threshold_days: 7
  apt_threshold_incidents: 5
  db_path: config/threat_memory.db
  max_context_tokens: 300
  reputation_decay_inactive_days: 7
  reputation_decay_rate: 0.95
tier1:
  dynamic_rules:
  - created_at: '2026-05-28T12:54:04.531527'
    field: Source IP
    pattern: 192.168.2.150
    reason: Có nhiều hoạt động truy cập cổng 80 từ cùng một địa chỉ IP (192.168.2.150)
      với thời gian lưu thông dài và số lượng gói tin lớn. Điều này có thể là dấu
      hiệu của một cuộc tấn công DDoS. Hệ thống thực hiện chặn IP để bảo vệ an toàn.
    score: 100
    source: langgraph_agent
    status: PENDING_APPROVAL
  - created_at: '2026-06-01T08:26:49.097643+00:00'
    field: Source IP
    pattern: 192.168.2.101
    reason: IP 192.168.2.101 thực hiện quét cổng liên tục trên nhiều cổng nhạy cảm
      (22, 3, 4, 5, 6, 7, 8, 9, 10, 11) với tần suất cao, khớp với kỹ thuật quét cổng
      (Port Scanning) T1583.008. Hành vi này có thể là dấu hiệu của một cuộc tấn công
      để tìm kiếm lỗ hổng bảo mật hoặc cài đặt backdoor.
    score: 100
    source: langgraph_agent
    status: PENDING_APPROVAL
  - created_at: '2026-06-01T08:28:37.858194+00:00'
    field: Source IP
    pattern: 192.168.2.99
    reason: IP nguồn 192.168.2.99 liên tục truy cập cổng 80 với số lượng gói tin bất
      thường, vượt quá mức cho phép. Hành vi này có thể là dấu hiệu của tấn công Malvertising.
      Hệ thống thực hiện chặn IP để ngăn chặn khả năng xâm nhập và phân tán malware.
    score: 100
    source: langgraph_agent
    status: PENDING_APPROVAL
  - created_at: '2026-06-01T08:38:35.964963+00:00'
    field: Source IP
    pattern: 10.0.0.22
    reason: Dữ liệu cho thấy IP 10.0.0.22 gửi một lượng gói tin bất thường (85000
      gói) đến cổng 80 với User-Agent là 'exfil-tool/v1.0'.  Hành vi này khớp với
      kỹ thuật Malvertising (T1583.008) và có thể là một nỗ lực exfiltration dữ liệu.
      Hệ thống nên chặn IP này để ngăn chặn hoạt động độc hại.
    score: 100
    source: langgraph_agent
    status: PENDING_APPROVAL
  - created_at: '2026-06-01T08:38:44.014284+00:00'
    field: Source IP
    pattern: 10.0.0.33
    reason: Dữ liệu cho thấy IP 10.0.0.33 gửi một lượng gói tin rất lớn (120000 gói)
      đến cổng 80, kèm theo user-agent là Wget/1.21.1 flood-bot, thường được sử dụng
      trong các cuộc tấn công DDoS.  Hành vi này khớp với kỹ thuật Malvertising (T1583.008)
      và có khả năng cao là một cuộc tấn công DDoS nhằm hạ gục dịch vụ.
    score: 100
    source: langgraph_agent
    status: PENDING_APPROVAL
  max_fwd_packets: 1000
  risk_threshold: 15
  sensitive_ports:
  - 21
  - 22
  - 23
  - 80
  - 443
  - 3389
  - 445
  - 1433
  - 3306
  - 5432
  session_baseline:
    deviation_threshold: 2.0
    eviction_interval: 100
    ttl_seconds: 600
    window_seconds: 300
  whitelist_ips:
  - 127.0.0.1
  - 10.0.0.99
  - 192.168.1.254
  - 0.0.0.0
