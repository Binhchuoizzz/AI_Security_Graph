[theme]
primaryColor = "#FF4B4B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1E222B"
textColor = "#FAFAFA"
font = "sans serif"

[server]
enableCORS = false
enableXsrfProtection = true
frameAncestors = ["'none'"]
# Tắt file-watcher: container production không cần hot-reload, đồng thời tránh việc
# watcher dò các module vision của transformers gây log noise 'No module named torchvision'.
fileWatcherType = "none"

[logger]
level = "warning"

