services:
  # ================================================================
  # LOCAL LLM SERVER — Gemma-2-9B-IT via llama.cpp (GPU Accelerated)
  # ================================================================
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: sentinel_llm
    runtime: nvidia
    ports:
      - "127.0.0.1:5000:8080"     # Map host:5000 → container:8080
    volumes:
      # Mount thư mục chứa model GGUF (read-only)
      - /home/binhchuoiz/text-generation-webui/user_data/models:/models:ro
    command: -m /models/${LLM_MODEL_FILE:-gemma-2-9b-it-Q6_K.gguf} -c ${LLAMA_ARG_CTX_SIZE:-16384} --host 0.0.0.0 --port 8080 -ngl 99 --flash-attn on -np ${LLAMA_ARG_N_PARALLEL:-2}
    environment:
      # Buộc sử dụng toàn bộ GPU layers (offload hết lên VRAM)
      LLAMA_ARG_N_GPU_LAYERS: "99"
      LLAMA_ARG_MODEL: "/models/${LLM_MODEL_FILE:-gemma-2-9b-it-Q6_K.gguf}"
      LLAMA_ARG_CTX_SIZE: "${LLAMA_ARG_CTX_SIZE:-16384}"
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8080"
      LLAMA_ARG_N_PARALLEL: "${LLAMA_ARG_N_PARALLEL:-2}"       # concurrent requests
      LLAMA_ARG_FLASH_ATTN: "1"       # Enable Flash Attention
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "all"
    deploy:
      resources:
        limits:
          memory: 20G
    networks:
      - sentinel_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s           # Model load takes ~30-60s

  # ================================================================
  # SENTINEL DASHBOARD — Streamlit UI (SOC SIEM Interface)
  # ================================================================
  agent_ui:
    build: .
    container_name: sentinel_dashboard
    ports:
      # Security: bind localhost only (đồng bộ với llm/redis/mlflow/neo4j — triết lý
      # air-gapped). Truy cập demo qua http://localhost:8501. Nếu cần truy cập từ máy
      # khác trong LAN, đổi thành "0.0.0.0:8501:8501" (dashboard vẫn có auth PBKDF2/RBAC).
      - "127.0.0.1:8501:8501"
    volumes:
      - .:/app:ro                 # Read-only mount to prevent container escape writes
      - ./logs:/app/logs          # Only logs directory is writable
      - ./mlruns:/app/mlruns      # Writable MLflow local runs
      - ./data:/app/data          # Writable Data
      - ./config:/app/config      # Writable Config (database, dynamic rules)
      - ./knowledge_base:/app/knowledge_base  # Writable KB (for FAISS updates)
    environment:
      # Đồng bộ múi giờ container với host (subscriber) để timestamp audit/HITL không lệch giờ
      - TZ=Asia/Ho_Chi_Minh
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      - LLM_API_BASE=http://llm:8080/v1
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
      llm:
        condition: service_healthy
    networks:
      - sentinel_net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    restart: unless-stopped

  # ================================================================
  # MLFLOW — Experiment Tracking Server
  # ================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: sentinel_mlflow
    ports:
      - "127.0.0.1:5001:5000"    # Security: Bind to localhost only
    volumes:
      - mlflow_data:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --artifacts-destination /mlruns
      --serve-artifacts
      --host 0.0.0.0
    networks:
      - sentinel_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      # mlflow image không có curl/wget → dùng python urllib tới /health
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ================================================================
  # REDIS — Streaming Queue + Session Cache
  # ================================================================
  redis:
    image: redis:7.4
    container_name: sentinel_redis
    ports:
      - "127.0.0.1:6379:6379"    # Security: Bind to localhost only
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command CONFIG ""
    networks:
      - sentinel_net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      # Auth-aware PING (redis yêu cầu password); grep PONG để chắc chắn server sống
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}\" ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ================================================================
  # NEO4J — Vulnerability Knowledge Graph (Optional)
  # ================================================================
  neo4j:
    image: neo4j:5.26-community
    container_name: sentinel_neo4j
    ports:
      - "127.0.0.1:7474:7474"              # Security: Bind to localhost only (HTTP Browser)
      - "127.0.0.1:7687:7687"              # Security: Bind to localhost only (Bolt protocol)
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - sentinel_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      # Neo4j sẵn wget; kiểm cổng HTTP Browser 7474 (không cần auth cho landing)
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  sentinel_net:
    driver: bridge
    internal: false

volumes:
  mlflow_data:
    driver: local
  neo4j_data:
    driver: local
