services:
  agent_ui:
    build: .
    container_name: sentinel_dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app:ro                 # Read-only mount to prevent container escape writes
      - ./logs:/app/logs          # Only logs directory is writable
      - ./mlruns:/app/mlruns      # Writable MLflow local runs
      - ./data:/app/data          # Writable Data
      - ./knowledge_base:/app/knowledge_base  # Writable KB (for FAISS updates)
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-SentinelSecurePass2026!}@redis:6379/0
    depends_on:
      mlflow:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - sentinel_net
    # Security: Resource limits to prevent DoS
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    # Security: Drop all capabilities, add only needed ones
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: sentinel_mlflow
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --default-artifact-root /mlruns
      --host 0.0.0.0
    networks:
      - sentinel_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped

  redis:
    image: redis:7.4
    container_name: sentinel_redis
    ports:
      - "127.0.0.1:6379:6379"  # Security: Bind to localhost only
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-SentinelSecurePass2026!}"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command CONFIG ""
    networks:
      - sentinel_net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    container_name: sentinel_neo4j
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-SentinelGraphPass2026!}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - sentinel_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped

networks:
  sentinel_net:
    driver: bridge
    # Security: Internal network isolation
    internal: false

volumes:
  mlflow_data:
    driver: local
  neo4j_data:
    driver: local
